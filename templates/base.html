<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AdGenie{% endblock %}</title>
  <meta name="description" content="Create product ads in sixty seconds." />
  <meta name="theme-color" content="#FAFAF7" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="/static/css/app.css" />

  <!-- Tailwind Play CDN for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Alpine.js (defer so DOM is ready) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- GSAP + ScrollTrigger + SplitText (now free) -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/SplitText.min.js"></script>

  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

  <!-- Supabase config from server -->
  <script>
    window.SUPABASE_URL = {{ supabase_url | tojson }};
    window.SUPABASE_ANON_KEY = {{ supabase_anon_key | tojson }};
  </script>

  <!-- App JS (must load before Alpine defer runs) -->
  <script src="/static/js/app.js"></script>

  {% block head %}{% endblock %}
</head>
<body x-data x-init="$store.auth.init()">

  <!-- Toast container -->
  <div class="toast-container">
    <template x-for="toast in $store.toasts.items" :key="toast.id">
      <div
        x-show="toast.visible"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        :class="['toast', toast.type === 'error' ? 'toast-error' : '']"
        x-text="toast.message"
      ></div>
    </template>
  </div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-inner" style="padding: 0.5rem 1.25rem;">
      <a href="/" class="navbar-logo">AdGenie</a>
      <div class="navbar-actions">
        <button onclick="createIfAuth()" class="btn btn-primary btn-sm" style="display:none;" id="nav-create">Create ad</button>
        <button onclick="createIfAuth()" class="btn btn-primary btn-sm hidden sm:inline-flex">Create ad</button>
        <a href="/dashboard" class="btn btn-secondary btn-sm nav-lib">Library</a>

        <template x-if="$store.auth.user">
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span
              class="avatar"
              x-text="$store.auth.initials"
              :title="$store.auth.user?.email"
            ></span>
            <button
              @click="$store.auth.signOut()"
              style="font-size:0.75rem;color:var(--muted-foreground);background:none;border:none;cursor:pointer;"
              onmouseover="this.style.color='var(--foreground)'"
              onmouseout="this.style.color='var(--muted-foreground)'"
            >Sign out</button>
          </div>
        </template>

        <template x-if="!$store.auth.user && !$store.auth.loading">
          <a href="/login" class="btn btn-secondary btn-sm">Log in</a>
        </template>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

  <!-- Lenis smooth scroll init -->
  <script>
    const lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 1 });
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);
    gsap.registerPlugin(ScrollTrigger);
    lenis.on('scroll', ScrollTrigger.update);
  </script>
</body>
</html>
